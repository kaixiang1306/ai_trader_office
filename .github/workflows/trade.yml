name: Trading Tick

on:
  schedule:
    # 每 5 分鐘跑一次（GitHub Actions 最短間隔）
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trading-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tick
        run: node tick.mjs

      - name: Commit & push state
        run: |
          git config user.name "trader-bot"
          git config user.email "trader-bot@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state change."
          else
            git commit -m "tick: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # 重試以應付罕見的並行衝突
            for i in 1 2 3; do
              if git push; then
                exit 0
              fi
              git pull --rebase
            done
            git push
          fi
